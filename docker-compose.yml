version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: backend_rbac_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: backend_rbac
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d backend_rbac"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_rbac_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - backend-network

networks:
  backend-network:
    name: backend-network
    driver: bridge

volumes:
  postgres_data: